# Decap CMS — INS Astro blog (https://decapcms.org/docs/basic-steps/)
backend:
  name: github
  repo: fins250903-arch/INS
  branch: main
  base_url: https://insbs.net

local_backend: false

site_url: https://insbs.net
display_url: https://insbs.net
logo_url: https://insbs.net/favicon.png

media_folder: public/blog-images
public_folder: /blog-images

slug:
  encoding: unicode
  clean_accents: true

collections:
  - name: blog
    label: ブログ記事
    label_singular: ブログ記事
    folder: src/content/blog
    path: '{{region}}/{{fields.urlSlug}}'
    create: true
    slug: '{{fields.urlSlug}}'
    extension: md
    format: frontmatter
    identifier_field: title
    media_folder: public/blog-images
    public_folder: /blog-images
    summary: '{{date}} · {{regionFull}} · {{title}}'
    sortable_fields:
      - { field: date, default_sort: desc }
      - title
      - region
      - regionFull
      - commit_date
    view_filters:
      - label: 下書き
        field: draft
        pattern: true
      - label: 公開済み
        field: draft
        pattern: false
    view_groups:
      - label: 地域
        field: region
        pattern: '{{region}}'
    preview_path: 'blog/{{region}}/{{fields.urlSlug}}'
    fields:
      - label: タイトル
        name: title
        widget: string
        required: true
      - label: URLスラッグ（ファイル名）
        name: urlSlug
        widget: string
        required: true
        hint: '英数字・ハイフン（例: sinnnyuubousi）。既存記事は現在のファイル名と同じにしてください。'
        pattern: ['^[a-z0-9][a-z0-9-]*$', '英小文字・数字・ハイフンのみ']
      - label: 公開日
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        required: true
      - label: 地域（識別子）
        name: region
        widget: select
        required: true
        options:
          - { label: 福岡, value: fukuoka }
          - { label: 大阪, value: osaka }
          - { label: 兵庫, value: hyougo }
          - { label: 滋賀, value: siga }
      - label: 地域名称（都道府県・全国）
        name: regionFull
        widget: select
        required: true
        hint: '記事の対象地域（全国47都道府県から選択）'
        options:
          - { label: 北海道, value: 北海道 }
          - { label: 青森県, value: 青森県 }
          - { label: 岩手県, value: 岩手県 }
          - { label: 宮城県, value: 宮城県 }
          - { label: 秋田県, value: 秋田県 }
          - { label: 山形県, value: 山形県 }
          - { label: 福島県, value: 福島県 }
          - { label: 茨城県, value: 茨城県 }
          - { label: 栃木県, value: 栃木県 }
          - { label: 群馬県, value: 群馬県 }
          - { label: 埼玉県, value: 埼玉県 }
          - { label: 千葉県, value: 千葉県 }
          - { label: 東京都, value: 東京都 }
          - { label: 神奈川県, value: 神奈川県 }
          - { label: 新潟県, value: 新潟県 }
          - { label: 富山県, value: 富山県 }
          - { label: 石川県, value: 石川県 }
          - { label: 福井県, value: 福井県 }
          - { label: 山梨県, value: 山梨県 }
          - { label: 長野県, value: 長野県 }
          - { label: 岐阜県, value: 岐阜県 }
          - { label: 静岡県, value: 静岡県 }
          - { label: 愛知県, value: 愛知県 }
          - { label: 三重県, value: 三重県 }
          - { label: 滋賀県, value: 滋賀県 }
          - { label: 京都府, value: 京都府 }
          - { label: 大阪府, value: 大阪府 }
          - { label: 兵庫県, value: 兵庫県 }
          - { label: 奈良県, value: 奈良県 }
          - { label: 和歌山県, value: 和歌山県 }
          - { label: 鳥取県, value: 鳥取県 }
          - { label: 島根県, value: 島根県 }
          - { label: 岡山県, value: 岡山県 }
          - { label: 広島県, value: 広島県 }
          - { label: 山口県, value: 山口県 }
          - { label: 徳島県, value: 徳島県 }
          - { label: 香川県, value: 香川県 }
          - { label: 愛媛県, value: 愛媛県 }
          - { label: 高知県, value: 高知県 }
          - { label: 福岡県, value: 福岡県 }
          - { label: 佐賀県, value: 佐賀県 }
          - { label: 長崎県, value: 長崎県 }
          - { label: 熊本県, value: 熊本県 }
          - { label: 大分県, value: 大分県 }
          - { label: 宮崎県, value: 宮崎県 }
          - { label: 鹿児島県, value: 鹿児島県 }
          - { label: 沖縄県, value: 沖縄県 }
      - label: 地域の件名
        name: areaLabel
        widget: string
        required: false
        hint: '一覧表示用（例）大阪・近畿エリア'
      - label: サムネイル画像
        name: thumbnail
        widget: image
        required: false
        media_library:
          config:
            multiple: false
      - label: 記事内画像
        name: images
        widget: list
        required: false
        field:
          label: 画像
          name: image
          widget: image
      - label: カノニカル URL
        name: canonicalUrl
        widget: string
        required: false
      - label: 下書き
        name: draft
        widget: boolean
        default: false
      - label: カテゴリ
        name: categories
        widget: list
        required: false
        field:
          label: カテゴリ
          name: category
          widget: string
      - label: タグ
        name: tags
        widget: list
        required: false
        field:
          label: タグ
          name: tag
          widget: string
      - label: 本文
        name: body
        widget: markdown
        required: true
      # ==========================================
      # ここから下を追加（SEO & マーケティング用フィールド）
      # ==========================================
      - label: SEO対策（検索エンジン用設定）
        name: seo
        widget: object
        summary: SEO設定
        fields:
          - label: メタ・タイトル（未入力時は上記タイトルを使用）
            name: meta_title
            widget: string
            required: false
            hint: 検索結果に表示されるタイトルです（推奨：30〜35文字）
          - label: メタ・ディスクリプション（記事の要約）
            name: meta_description
            widget: text
            required: true
            hint: 検索結果の解説文です。SNSのシェア時にも使われます（推奨：120文字前後）
          - label: 主要キーワード（フォーカスキーワード）
            name: keywords
            widget: string
            required: false
            hint: この記事で狙うSEOキーワード（カンマ区切り：例 Astro, SEO, ブログ）
          - label: インデックス拒否（noindex）
            name: noindex
            widget: boolean
            default: false
            hint: チェックを入れると、検索エンジンにインデックスされなくなります（下書きや低品質ページの隠蔽用）
      - label: SNS・マーケティング設定（OGP）
        name: ogp
        widget: object
        summary: SNSシェア設定
        fields:
          - label: アイキャッチ・OGP画像
            name: og_image
            widget: image
            required: false
            hint: X（旧Twitter）やFacebookでシェアされた際に表示される画像です
          - label: 記事のタイプ
            name: og_type
            widget: select
            options:
              - article
              - website
            default: article
